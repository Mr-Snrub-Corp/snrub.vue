name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint:ci
      - name: Format check
        run: npm run format:check
      - name: Type check
        run: npm run type-check

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # coverage PR comment
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Unit tests + coverage
        run: npx vitest run --coverage
      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
      - name: Coverage PR comment
        # Skip on fork PRs (read-only token can't post) and never let a
        # cosmetic comment failure fail the required `test` check.
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        # Pinned to a full SHA (supply-chain hardening); SHA == tag v2.12.1.
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build-only
